<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>遊戲大廳</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --surface3: #2a2a3a;
  --border: rgba(255,255,255,0.08);
  --accent: #7c3aed;
  --accent2: #9d5cf6;
  --accent-glow: rgba(124,58,237,0.3);
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #5a5a72;
  --radius: 20px;
  --radius-sm: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* ── HEADER ── */
.header {
  padding: 56px 24px 0;
  text-align: center;
  position: relative;
}
.lang-btn {
  position: absolute;
  top: 20px; right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.15s;
}
.lang-btn:hover { background: var(--surface3); color: var(--text); }

.lobby-logo { font-size: 3.5rem; margin-bottom: 14px; }
.lobby-title {
  font-size: 2.4rem;
  font-weight: 900;
  background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.lobby-sub { color: var(--text2); font-size: 1rem; margin-bottom: 40px; }

/* ── GAME GRID ── */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  padding: 0 20px 40px;
  max-width: 600px;
  margin: 0 auto;
}

/* ── GAME CARD ── */
.game-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 16px 20px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  text-decoration: none;
  color: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--card-glow, transparent);
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: var(--radius);
}
.game-card:hover { transform: translateY(-4px); border-color: var(--card-color, var(--accent)); box-shadow: 0 12px 40px var(--card-shadow, var(--accent-glow)); }
.game-card:hover::before { opacity: 1; }
.game-card:active { transform: scale(0.97); }

.game-card.coming-soon {
  opacity: 0.45;
  cursor: default;
  pointer-events: none;
}

.card-emoji { font-size: 3rem; line-height: 1; }
.card-name { font-size: 1rem; font-weight: 800; }
.card-desc { font-size: 0.78rem; color: var(--text2); line-height: 1.4; }
.card-players {
  font-size: 0.72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--surface3);
  color: var(--text3);
  letter-spacing: 0.3px;
}
.card-badge {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 0.62rem;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 6px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.badge-ready { background: rgba(34,197,94,0.15); color: #22c55e; }
.badge-soon { background: var(--surface3); color: var(--text3); }

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 0 24px 48px;
  color: var(--text3);
  font-size: 0.78rem;
  line-height: 1.8;
}
.footer a { color: var(--text3); text-decoration: none; }
.footer a:hover { color: var(--text2); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.header { animation: fadeUp 0.4s ease forwards; }
.game-card { animation: fadeUp 0.4s ease forwards; opacity: 0; }
.game-card:nth-child(1) { animation-delay: 0.05s; }
.game-card:nth-child(2) { animation-delay: 0.10s; }
.game-card:nth-child(3) { animation-delay: 0.15s; }
.game-card:nth-child(4) { animation-delay: 0.20s; }
.game-card:nth-child(5) { animation-delay: 0.25s; }
.game-card:nth-child(6) { animation-delay: 0.30s; }
</style>
</head>
<body>

<div class="header">
  <button class="lang-btn" id="lang-btn" onclick="toggleLang()">简体</button>
  <div class="lobby-logo">🎮</div>
  <div class="lobby-title" id="title">遊戲大廳</div>
  <p class="lobby-sub" id="subtitle">選擇一個遊戲，即開即玩</p>
</div>

<div class="game-grid">

  <!-- 谁是卧底 — 已上线 -->
  <a class="game-card" href="./undercover/index.html"
     style="--card-color:#7c3aed; --card-shadow:rgba(124,58,237,0.3); --card-glow:linear-gradient(135deg,rgba(124,58,237,0.06) 0%,transparent 100%);">
    <span class="card-badge badge-ready" id="badge-ready">已上線</span>
    <div class="card-emoji">🕵️</div>
    <div class="card-name" id="game1-name">誰是臥底</div>
    <div class="card-desc" id="game1-desc">用語言偽裝自己，找出隱藏的臥底</div>
    <div class="card-players" id="game1-players">3–12 人</div>
  </a>

  <!-- 狼人杀 — 已上线 -->
  <a class="game-card" href="./werewolf/index.html"
     style="--card-color:#dc2626; --card-shadow:rgba(220,38,38,0.3); --card-glow:linear-gradient(135deg,rgba(220,38,38,0.06) 0%,transparent 100%);">
    <span class="card-badge badge-ready">已上線</span>
    <div class="card-emoji">🐺</div>
    <div class="card-name" id="game2-name">狼人殺</div>
    <div class="card-desc" id="game2-desc">白天投票，夜晚廝殺，找出狼人</div>
    <div class="card-players" id="game2-players">6–12 人</div>
  </a>

  <!-- 猜猜画画 — 即将上线 -->
  <div class="game-card coming-soon"
     style="--card-color:#f59e0b; --card-shadow:rgba(245,158,11,0.3);">
    <span class="card-badge badge-soon">即將上線</span>
    <div class="card-emoji">🎨</div>
    <div class="card-name" id="game3-name">猜猜畫畫</div>
    <div class="card-desc" id="game3-desc">一人作畫，眾人競猜，歡笑不斷</div>
    <div class="card-players" id="game3-players">3–10 人</div>
  </div>

  <!-- 真心话大冒险 — 即将上线 -->
  <div class="game-card coming-soon"
     style="--card-color:#22c55e; --card-shadow:rgba(34,197,94,0.3);">
    <span class="card-badge badge-soon">即將上線</span>
    <div class="card-emoji">🎲</div>
    <div class="card-name" id="game4-name">真心話大冒險</div>
    <div class="card-desc" id="game4-desc">選擇真心話或大冒險，挑戰極限</div>
    <div class="card-players" id="game4-players">2–10 人</div>
  </div>

</div>

<div class="footer">
  <p id="footer-text">無需下載 · 即開即玩 · 支援多人同樂</p>
</div>

<script>
const LANGS = {
  'zh-TW': {
    title: '遊戲大廳',
    subtitle: '選擇一個遊戲，即開即玩',
    langBtn: '简体',
    badgeReady: '已上線',
    badgeSoon: '即將上線',
    game1Name: '誰是臥底',
    game1Desc: '用語言偽裝自己，找出隱藏的臥底',
    game1Players: '3–12 人',
    game2Name: '狼人殺',
    game2Desc: '白天投票，夜晚廝殺，找出狼人',
    game2Players: '6–18 人',
    game3Name: '猜猜畫畫',
    game3Desc: '一人作畫，眾人競猜，歡笑不斷',
    game3Players: '3–10 人',
    game4Name: '真心話大冒險',
    game4Desc: '選擇真心話或大冒險，挑戰極限',
    game4Players: '2–10 人',
    footer: '無需下載 · 即開即玩 · 支援多人同樂',
  },
  'zh-CN': {
    title: '游戏大厅',
    subtitle: '选择一个游戏，即开即玩',
    langBtn: '繁體',
    badgeReady: '已上线',
    badgeSoon: '即将上线',
    game1Name: '谁是卧底',
    game1Desc: '用语言伪装自己，找出隐藏的卧底',
    game1Players: '3–12 人',
    game2Name: '狼人杀',
    game2Desc: '白天投票，夜晚厮杀，找出狼人',
    game2Players: '6–18 人',
    game3Name: '猜猜画画',
    game3Desc: '一人作画，众人竞猜，欢笑不断',
    game3Players: '3–10 人',
    game4Name: '真心话大冒险',
    game4Desc: '选择真心话或大冒险，挑战极限',
    game4Players: '2–10 人',
    footer: '无需下载 · 即开即玩 · 支持多人同乐',
  }
};

let lang = localStorage.getItem('lobby_lang') || 'zh-TW';

function applyLang() {
  const d = LANGS[lang];
  document.getElementById('title').textContent = d.title;
  document.getElementById('subtitle').textContent = d.subtitle;
  document.getElementById('lang-btn').textContent = d.langBtn;
  document.querySelectorAll('.badge-ready').forEach(el => el.textContent = d.badgeReady);
  document.querySelectorAll('.badge-soon').forEach(el => el.textContent = d.badgeSoon);
  document.getElementById('game1-name').textContent = d.game1Name;
  document.getElementById('game1-desc').textContent = d.game1Desc;
  document.getElementById('game1-players').textContent = d.game1Players;
  document.getElementById('game2-name').textContent = d.game2Name;
  document.getElementById('game2-desc').textContent = d.game2Desc;
  document.getElementById('game2-players').textContent = d.game2Players;
  document.getElementById('game3-name').textContent = d.game3Name;
  document.getElementById('game3-desc').textContent = d.game3Desc;
  document.getElementById('game3-players').textContent = d.game3Players;
  document.getElementById('game4-name').textContent = d.game4Name;
  document.getElementById('game4-desc').textContent = d.game4Desc;
  document.getElementById('game4-players').textContent = d.game4Players;
  document.getElementById('footer-text').textContent = d.footer;
  document.title = d.title;
}

function toggleLang() {
  lang = lang === 'zh-TW' ? 'zh-CN' : 'zh-TW';
  localStorage.setItem('lobby_lang', lang);
  applyLang();
}

applyLang();
</script>
</body>
</html>
